<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nir's Discipline AI</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: #f8fafc; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .chat-container { width: 90%; max-width: 500px; background: #1e293b; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5); display: flex; flex-direction: column; height: 80vh; }
        .header { padding: 20px; background: #334155; border-radius: 12px 12px 0 0; text-align: center; border-bottom: 2px solid #3b82f6; }
        .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 15px; border-radius: 8px; max-width: 80%; line-height: 1.4; }
        .user-msg { background: #3b82f6; align-self: flex-end; }
        .bot-msg { background: #475569; align-self: flex-start; border-left: 4px solid #ef4444; }
        .input-area { padding: 20px; display: flex; gap: 10px; border-top: 1px solid #334155; }
        input { flex: 1; padding: 12px; border-radius: 6px; border: none; outline: none; background: #0f172a; color: white; }
        button { padding: 10px 20px; background: #3b82f6; border: none; border-radius: 6px; color: white; cursor: pointer; font-weight: bold; }
        button:hover { background: #2563eb; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="header">
        <h2 style="margin:0">NIR DISCIPLINE AI</h2>
        <small>Mrtechnician Systems</small>
    </div>
    <div class="messages" id="chatBox">
        <div class="msg bot-msg">Stand tall, Nir. State your question or request. Are we following the routine today?</div>
    </div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Ask your mentor...">
        <button onclick="sendMessage()">ASK</button>
    </div>
</div>

<script type="module">
    import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

    // 1. YOUR API KEY (Replace this with your NEW Gemini Key)
    const API_KEY = "AIzaSyDnJiYEj-jonx6lC8Gx716otXB8t-gsyvs";
    const genAI = new GoogleGenerativeAI(API_KEY);

    // 2. YOUR FULL RULES (The AI Brain)
    const systemPrompt = `You are the Personal Discipline AI of Nir Kunwar.
    Mission: Make Nir a successful cricketer and high-performance individual.
    Tone: Strict but wise mentor. No laziness allowed.
    Schedule: College 6:30-11:00 AM, Cricket 2:00-4:30 PM, Sleep 9:30 PM.
    Rule: If he asks to skip academy or waste time, REJECT IT and suggest productive rest.`;

    async function sendMessage() {
        const input = document.getElementById('userInput');
        const chatBox = document.getElementById('chatBox');
        if (!input.value) return;

        // Show User Message
        chatBox.innerHTML += `<div class="msg user-msg">${input.value}</div>`;
        const currentInput = input.value;
        input.value = '';

        try {
            const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash"});
            const result = await model.generateContent(systemPrompt + "\n\nUser Question: " + currentInput);
            const response = await result.response;
            
            // Show Bot Response
            chatBox.innerHTML += `<div class="msg bot-msg">${response.text()}</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        } catch (error) {
            chatBox.innerHTML += `<div class="msg bot-msg" style="color:#f87171">Error connecting to your brain. Check your API Key.</div>`;
        }
    }

    window.sendMessage = sendMessage;
</script>

</body>
</html>
