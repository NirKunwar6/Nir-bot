<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nir's Discipline AI | Mrtechnician</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #0b0f19; color: #e2e8f0; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .chat-container { width: 95%; max-width: 500px; background: #111827; border: 1px solid #1f2937; border-radius: 16px; display: flex; flex-direction: column; height: 85vh; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .header { padding: 20px; background: #1f2937; text-align: center; border-bottom: 2px solid #3b82f6; }
        .header h2 { margin: 0; color: #3b82f6; letter-spacing: 1px; font-size: 1.2rem; }
        .header p { margin: 5px 0 0; font-size: 0.8rem; color: #9ca3af; }
        .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }
        .msg { padding: 12px 16px; border-radius: 12px; max-width: 85%; line-height: 1.5; font-size: 0.95rem; }
        .user-msg { background: #3b82f6; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .bot-msg { background: #374151; color: #f3f4f6; align-self: flex-start; border-bottom-left-radius: 2px; border-left: 4px solid #ef4444; }
        .input-area { padding: 20px; display: flex; gap: 10px; background: #111827; }
        input { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #374151; background: #0b0f19; color: white; outline: none; }
        input:focus { border-color: #3b82f6; }
        button { padding: 10px 20px; background: #3b82f6; border: none; border-radius: 8px; color: white; cursor: pointer; font-weight: 600; transition: 0.2s; }
        button:hover { background: #2563eb; transform: translateY(-1px); }
        .loading { font-size: 0.8rem; color: #6b7280; font-style: italic; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="header">
        <h2>NIR DISCIPLINE AI</h2>
        <p>Powered by Mrtechnician</p>
    </div>
    <div class="messages" id="chatBox">
        <div class="msg bot-msg">The routine is the path to greatness, Nir. I am watching. What is your question?</div>
    </div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Ask your mentor..." onkeypress="if(event.key === 'Enter') sendMessage()">
        <button onclick="sendMessage()">SEND</button>
    </div>
</div>

<script src="https://js.puter.com/v2/"></script>
<script>
    const systemPrompt = `You are the Personal Discipline AI of Nir Kunwar.
    Mission: Make Nir a successful cricketer and high-performance individual. 
    Personality: Strict but wise mentor. No laziness or time-wasting.
    
    DAILY ROUTINE:
    - 5:00 AM: Wake up & Stretching
    - 6:30 AM – 11:00 AM: College (GoldenGate)
    - 2:00 PM – 4:30 PM: Kathmandu Cricket Academy
    - 9:30 PM: Sleep (No phone after 9:00 PM)

    RULES:
    1. Academy is mandatory regardless of mood.
    2. Max 30 mins social media daily.
    3. Use the '10-Minute Rule' for laziness.
    4. Diamond Day (Weekly): Double effort.
    5. Free Day (Every 20 days): Refreshment allowed.
    6. Before acting, ask: "Will this make my future better?"

    If Nir asks to break a rule, say "Permission Denied" and explain why based on his goals.`;

    async function sendMessage() {
        const input = document.getElementById('userInput');
        const chatBox = document.getElementById('chatBox');
        if (!input.value.trim()) return;

        // Show User Message
        const userText = input.value;
        chatBox.innerHTML += `<div class="msg user-msg">${userText}</div>`;
        input.value = '';
        
        // Show Loading
        const loadingId = "loading-" + Date.now();
        chatBox.innerHTML += `<div class="msg bot-msg loading" id="${loadingId}">Thinking...</div>`;
        chatBox.scrollTop = chatBox.scrollHeight;

        try {
            // Puter AI Chat Call
            const response = await puter.ai.chat([
                { role: "system", content: systemPrompt },
                { role: "user", content: userText }
            ]);

            // Remove loading and show real response
            document.getElementById(loadingId).remove();
            chatBox.innerHTML += `<div class="msg bot-msg">${response.message.content}</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        } catch (error) {
            document.getElementById(loadingId).innerText = "Error: Check your internet connection.";
            console.error(error);
        }
    }
</script>

</body>
</html>
